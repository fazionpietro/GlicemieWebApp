databaseChangeLog:
  - changeSet:
      id: 1-create-farmaci-table
      author: pietro
      changes:
        - createTable:
            tableName: FARMACI
            columns:
              - column:
                  name: ID_FARMACO
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: BUGIARDINO
                  type: CLOB
              - column:
                  name: NOME
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
  - changeSet:
      id: 2-create-logs-table
      author: pietro
      changes:
        - createTable:
            tableName: LOGS
            columns:
              - column:
                  name: ID_LOG
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: DESCRIZIONE
                  type: CLOB
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
  - changeSet:
      id: 3-create-sintomi-table
      author: pietro
      changes:
        - createTable:
            tableName: SINTOMI
            columns:
              - column:
                  name: ID_SINTOMO
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: DESCRIZIONE
                  type: CLOB
                  constraints:
                    nullable: false
              - column:
                  name: NOME
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
  - changeSet:
      id: 4-create-utenti-table
      author: pietro
      changes:
        - createTable:
            tableName: UTENTI
            columns:
              - column:
                  name: ID_UTENTE
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: COGNOME
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: DATA_NASCITA
                  type: DATE
                  constraints:
                    nullable: false
              - column:
                  name: EMAIL
                  type: VARCHAR(320)
                  constraints:
                    nullable: false
                    unique: true
                    uniqueConstraintName: UK9B90MK1NOLF3OU90P42A93TJO
              - column:
                  name: NOME
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
              - column:
                  name: PASSWORD_HASH
                  type: VARCHAR(256)
                  constraints:
                    nullable: false
              - column:
                  name: RUOLO
                  type: VARCHAR(20)
                  constraints:
                    nullable: false
  - changeSet:
      id: 5-create-pazienti-table
      author: pietro
      changes:
        - createTable:
            tableName: PAZIENTI
            columns:
              - column:
                  name: ID_PAZIENTE
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: COMORBITA
                  type: CLOB
              - column:
                  name: FATTORI_RISCHIO
                  type: CLOB
              - column:
                  name: PATOLOGIE_PREGRESSE
                  type: CLOB
              - column:
                  name: ID_MEDICO
                  type: UUID
  - changeSet:
      id: 6-create-assunzioni-table
      author: pietro
      changes:
        - createTable:
            tableName: ASSUNZIONI
            columns:
              - column:
                  name: ID_ASSUNZIONE
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: QUANTITA
                  type: DOUBLE
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: ID_FARMACO
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: ID_PAZIENTE
                  type: UUID
                  constraints:
                    nullable: false
  - changeSet:
      id: 7-create-rilevazioni-table
      author: pietro
      changes:
        - createTable:
            tableName: RILEVAZIONI
            columns:
              - column:
                  name: ID_RILEVAZIONE
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: VALORE
                  type: DOUBLE
                  constraints:
                    nullable: false
              - column:
                  name: ID_PAZIENTE
                  type: UUID
                  constraints:
                    nullable: false
  - changeSet:
      id: 8-create-segnalazioni-table
      author: pietro
      changes:
        - createTable:
            tableName: SEGNALAZIONI
            columns:
              - column:
                  name: ID_SEGNALAZIONE
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: DESCRIZIONE
                  type: CLOB
                  constraints:
                    nullable: false
              - column:
                  name: INTENSITA
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: timestamp
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: ID_PAZIENTE
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: ID_SINTOMO
                  type: UUID
                  constraints:
                    nullable: false
  - changeSet:
      id: 9-create-terapie-table
      author: pietro
      changes:
        - createTable:
            tableName: TERAPIE
            columns:
              - column:
                  name: ID_TERAPIA
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: INDICAZIONI
                  type: CLOB
              - column:
                  name: NUM_ASSUNZIONI
                  type: INT
                  constraints:
                    nullable: false
              - column:
                  name: QUANTITA
                  type: DOUBLE
                  constraints:
                    nullable: false
              - column:
                  name: ID_FARMACO
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: ID_PAZIENTE
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: MEDICO_CURANTE
                  type: UUID
                  constraints:
                    nullable: false

  - changeSet:
      id: 10-add-foreign-keys
      author: pietro
      changes:
        - addForeignKeyConstraint:
            baseTableName: PAZIENTI
            baseColumnNames: ID_MEDICO
            referencedTableName: UTENTI
            referencedColumnNames: ID_UTENTE
            constraintName: FK6SAJR4OP20WA8GV24PK9I5MN2
        - addForeignKeyConstraint:
            baseTableName: PAZIENTI
            baseColumnNames: ID_PAZIENTE
            referencedTableName: UTENTI
            referencedColumnNames: ID_UTENTE
            constraintName: FKF8AL9M5WMW5NFFJVWUKG1VY52
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: ASSUNZIONI
            baseColumnNames: ID_PAZIENTE
            referencedTableName: PAZIENTI
            referencedColumnNames: ID_PAZIENTE
            constraintName: FK1E53E175OLG7F8AALA0HMPKUN
        - addForeignKeyConstraint:
            baseTableName: ASSUNZIONI
            baseColumnNames: ID_FARMACO
            referencedTableName: FARMACI
            referencedColumnNames: ID_FARMACO
            constraintName: FK5T57NBCVX73FEFU0BRB8XIUKO
        - addForeignKeyConstraint:
            baseTableName: RILEVAZIONI
            baseColumnNames: ID_PAZIENTE
            referencedTableName: PAZIENTI
            referencedColumnNames: ID_PAZIENTE
            constraintName: FKEURLSL7P76KEBFG59SG98ND1C
        - addForeignKeyConstraint:
            baseTableName: SEGNALAZIONI
            baseColumnNames: ID_PAZIENTE
            referencedTableName: PAZIENTI
            referencedColumnNames: ID_PAZIENTE
            constraintName: FKLOKFF0GULRSK9A54PXOAD567L
        - addForeignKeyConstraint:
            baseTableName: SEGNALAZIONI
            baseColumnNames: ID_SINTOMO
            referencedTableName: SINTOMI
            referencedColumnNames: ID_SINTOMO
            constraintName: FKQGKULI7KXWS93RG4EATL7LILX
        - addForeignKeyConstraint:
            baseTableName: TERAPIE
            baseColumnNames: MEDICO_CURANTE
            referencedTableName: UTENTI
            referencedColumnNames: ID_UTENTE
            constraintName: FK2GHK2SQ0RN0346POYGKOAUA9M
        - addForeignKeyConstraint:
            baseTableName: TERAPIE
            baseColumnNames: ID_FARMACO
            referencedTableName: FARMACI
            referencedColumnNames: ID_FARMACO
            constraintName: FKKAE9FAHOO456MFVP46UU5CUA4
        - addForeignKeyConstraint:
            baseTableName: TERAPIE
            baseColumnNames: ID_PAZIENTE
            referencedTableName: PAZIENTI
            referencedColumnNames: ID_PAZIENTE
            constraintName: FKSN2VOUVE8JUQQI1O6CTNUM05V

